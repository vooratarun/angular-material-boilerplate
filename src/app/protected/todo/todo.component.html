<mat-card class="todo-card">
  <mat-card-header>
    <mat-card-title>Todo App</mat-card-title>
    <mat-card-subtitle>Manage your day with Angular Material</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <form class="todo-form" (submit)="addTodo(); $event.preventDefault()">
      <mat-form-field appearance="outline" class="todo-input">
        <mat-label>Add a task</mat-label>
        <input matInput [formControl]="newTodoControl" maxlength="100" placeholder="Review pull request">
        <mat-hint align="end">{{ newTodoControl.value.length }} / 100</mat-hint>
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="newTodoControl.invalid">
        Add
      </button>
    </form>

    @if (todos.length) {
      <mat-list>
        @for (todo of todos; track todo.id) {
          <mat-list-item>
            <div class="todo-item">
              <mat-checkbox [checked]="todo.completed" (change)="toggleTodo(todo.id)">
                <span [class.completed]="todo.completed">{{ todo.title }}</span>
              </mat-checkbox>

              <button mat-icon-button color="warn" type="button" aria-label="Delete task" (click)="removeTodo(todo.id)">
                <mat-icon>delete</mat-icon>
              </button>
            </div>
          </mat-list-item>
        }
      </mat-list>

      <div class="todo-footer">
        <span>{{ completedCount }} / {{ todos.length }} completed</span>
        <button mat-button type="button" (click)="clearCompleted()" [disabled]="completedCount === 0">
          Clear completed
        </button>
      </div>
    } @else {
      <div class="empty-state">
        <mat-icon>task</mat-icon>
        <p>No tasks yet. Add your first todo above.</p>
      </div>
    }
  </mat-card-content>
</mat-card>
